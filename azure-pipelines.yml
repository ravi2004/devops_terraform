trigger:
 branches:
   include:
     - main

pr:
 branches:
   include:
     - main

pool:
 vmImage: 'ubuntu-latest'

variables:
 terraformWorkingDirectory: 'infra'
 terraformVersion: '1.15.8'
 azureServiceConnection: 'AzureDevops-Connection'
 environmentName: 'prod'

stages:
 - stage: Validate
   displayName: 'Validate Terraform'
   jobs:
     - job: Validate
       displayName: 'Run terraform fmt and validate'
       steps:
         - checkout: self

         - task: TerraformInstaller@1
           displayName: 'Install Terraform'
           inputs:
             terraformVersion: '$(terraformVersion)'

         - task: AzureCLI@2
           displayName: 'Terraform fmt and validate'
           inputs:
             azureSubscription: '$(azureServiceConnection)'
             addSpnToEnvironment: true
             scriptType: 'bash'
             scriptLocation: 'inlineScript'
             inlineScript: |
              $ErrorActionPreference = "Stop"

              $env:TF_IN_AUTOMATION = "true"
              $env:ARM_USE_OIDC = "true"
              $env:ARM_USE_AZUREAD = "true"
              $env:ARM_OIDC_TOKEN = "$idToken"
              $env:ARM_CLIENT_ID = "$servicePrincipalId"
              $env:ARM_TENANT_ID = "$tenantId"
              $env:ARM_SUBSCRIPTION_ID = $(az account show --query id -o tsv)
              $env:ARM_OIDC_AZURE_SERVICE_CONNECTION_ID = "$AZURESUBSCRIPTION_SERVICE_CONNECTION_ID"

              Set-Location "$(terraformWorkingDirectory)"

              terraform fmt -check -recursive
              terraform init -input=false
              terraform validate

 - stage: Plan
   displayName: 'Plan Terraform'
   dependsOn: Validate
   jobs:
     - job: Plan
       displayName: 'Create Terraform plan'
       steps:
         - checkout: self

         - task: TerraformInstaller@1
           displayName: 'Install Terraform'
           inputs:
             terraformVersion: '$(terraformVersion)'

         - task: AzureCLI@2
           displayName: 'Terraform plan'
           inputs:
             azureSubscription: '$(azureServiceConnection)'
             addSpnToEnvironment: true
             scriptType: 'bash'
             scriptLocation: 'inlineScript'
             inlineScript: |
              $ErrorActionPreference = "Stop"

              $env:TF_IN_AUTOMATION = "true"
              $env:ARM_USE_OIDC = "true"
              $env:ARM_USE_AZUREAD = "true"
              $env:ARM_OIDC_TOKEN = "$idToken"
              $env:ARM_CLIENT_ID = "$servicePrincipalId"
              $env:ARM_TENANT_ID = "$tenantId"
              $env:ARM_SUBSCRIPTION_ID = $(az account show --query id -o tsv)
              $env:ARM_OIDC_AZURE_SERVICE_CONNECTION_ID = "$AZURESUBSCRIPTION_SERVICE_CONNECTION_ID"

              Set-Location "$(terraformWorkingDirectory)"

              terraform init -input=false
              terraform plan -input=false -lock-timeout=300s -out=tfplan -var-file=prod.tfvars
              terraform show -no-color tfplan | Out-File -FilePath "tfplan.txt" -Encoding ascii

              New-Item -ItemType Directory -Force -Path "$(Build.ArtifactStagingDirectory)/terraform-plan"
              Copy-Item -Path "tfplan" -Destination "$(Build.ArtifactStagingDirectory)/terraform-plan/tfplan" -Force
              Copy-Item -Path "tfplan.txt" -Destination "$(Build.ArtifactStagingDirectory)/terraform-plan/tfplan.txt" -Force

         - publish: '$(Build.ArtifactStagingDirectory)/terraform-plan'
           artifact: 'terraform-plan'
           displayName: 'Publish Terraform plan artifact'

 - stage: Apply
   displayName: 'Apply Terraform'
   dependsOn: Plan
   condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
   jobs:
     - deployment: Apply
       displayName: 'Apply Terraform to production'
       environment: '$(environmentName)'
       strategy:
         runOnce:
           deploy:
             steps:
               - checkout: self

               - task: DownloadPipelineArtifact@2
                 displayName: 'Download Terraform plan artifact'
                 inputs:
                   buildType: 'current'
                   artifactName: 'terraform-plan'
                   targetPath: '$(Pipeline.Workspace)/terraform-plan'

               - task: TerraformInstaller@1
                 displayName: 'Install Terraform'
                 inputs:
                   terraformVersion: '$(terraformVersion)'

               - task: AzureCLI@2
                 displayName: 'Terraform apply'
                 inputs:
                   azureSubscription: '$(azureServiceConnection)'
                   addSpnToEnvironment: true
                   scriptType: 'bash'
                   scriptLocation: 'inlineScript'
                   inlineScript: |
                    $ErrorActionPreference = "Stop"

                    $env:TF_IN_AUTOMATION = "true"
                    $env:ARM_USE_OIDC = "true"
                    $env:ARM_USE_AZUREAD = "true"
                    $env:ARM_OIDC_TOKEN = "$idToken"
                    $env:ARM_CLIENT_ID = "$servicePrincipalId"
                    $env:ARM_TENANT_ID = "$tenantId"
                    $env:ARM_SUBSCRIPTION_ID = $(az account show --query id -o tsv)
                    $env:ARM_OIDC_AZURE_SERVICE_CONNECTION_ID = "$AZURESUBSCRIPTION_SERVICE_CONNECTION_ID"

                    Set-Location "$(terraformWorkingDirectory)"

                     terraform init -input=false
                     terraform apply -input=false -lock-timeout=300s "$(Pipeline.Workspace)/terraform-plan/tfplan"